databases:
  - name: weber_exchangedb
    plan: free
    databaseName: weber_exchange
    user: weber_exchange

services:
  - type: web
    plan: free
    name: weber_exchange
    runtime: python
    buildCommand: './build.sh'
    startCommand: 'python -m gunicorn config.asgi:application -k uvicorn.workers.UvicornWorker'
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: weber_exchangedb
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4