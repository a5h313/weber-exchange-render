databases:
  - name: weber-exchangedb
    plan: free
    databaseName: weber-exchange
    user: weber-exchange

services:
  - type: web
    plan: free
    name: weber-exchange
    runtime: python
    buildCommand: './build.sh'
    startCommand: 'python -m gunicorn weber-exchange.asgi:application -k uvicorn.workers.UvicornWorker'
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: weber-exchangedb
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4